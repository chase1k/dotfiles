# ============================================================
# General
# ============================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on
set -s escape-time 0
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Mouse support
set -g mouse on

# ============================================================
# Prefix: Ctrl-a
# ============================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================
# Key Bindings
# ============================================================
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits in current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style, no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-p previous-window
bind -n M-n next-window

# ============================================================
# Copy Mode (vi)
# ============================================================
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# WSL clipboard support
if-shell "grep -qi microsoft /proc/version 2>/dev/null" \
    "set -g @yank-command 'win32yank.exe -i --crlf'" \
    ""

# ============================================================
# Status Bar
# ============================================================
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7] "
set -g status-right "#[fg=#565f89] %H:%M  %d %b #[fg=#7aa2f7] #h "

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[bg=#3d59a1,fg=#c0caf5,bold] #I:#W "

# Pane border
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ============================================================
# Plugins (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-resurrect: restore neovim sessions
set -g @resurrect-strategy-nvim 'session'
# tmux-continuum: auto-save every 15 min, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
